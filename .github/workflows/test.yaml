name: Main workflow

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y shfmt

      - name: Run shfmt
        run: shfmt -d jinmori

      - name: Run shellcheck
        run: shellcheck jinmori
